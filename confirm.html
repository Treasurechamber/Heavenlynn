<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Heavenlynn — Confirm Order</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f9d6e3 0%, #fce4ec 50%, #f3e5f5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 2rem 1.8rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }

    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo h1 { font-family: 'Dancing Script', cursive; font-size: 2rem; color: #c2185b; }
    .logo p { font-size: 0.85rem; color: #888; margin-top: 0.2rem; }

    #pinScreen { display: block; }
    #mainScreen { display: none; }

    .label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid #f0c5d5;
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus { border-color: #c2185b; }
    input.error { border-color: #e53935; }

    .btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #e91e8c, #c2185b);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      margin-top: 1.2rem;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); opacity: 0.9; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .field { margin-bottom: 1.2rem; }

    .msg {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      display: none;
      text-align: center;
    }

    .msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .msg.error { background: #ffebee; color: #c62828; display: block; }

    .hint {
      font-size: 0.78rem;
      color: #999;
      margin-top: 0.35rem;
      line-height: 1.4;
    }

    .divider {
      border: none;
      border-top: 1px solid #f0e0e8;
      margin: 1.5rem 0;
    }

    .history-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.8rem;
    }

    .history-list { list-style: none; max-height: 200px; overflow-y: auto; }

    .history-list li {
      font-size: 0.82rem;
      color: #666;
      padding: 0.5rem 0;
      border-bottom: 1px solid #fce4ec;
    }

    .history-list li:last-child { border-bottom: none; }

    .history-top {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.15rem;
    }

    .tier-badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      background: #fce4ec;
      color: #c2185b;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>heavenlynn</h1>
    <p>Employee Order Confirmation</p>
  </div>

  <div id="pinScreen">
    <div class="field">
      <label class="label" for="pinInput">Enter Employee PIN</label>
      <input type="password" id="pinInput" placeholder="••••" maxlength="6" inputmode="numeric"
             onkeypress="if(event.key==='Enter') checkPin()">
    </div>
    <button class="btn" onclick="checkPin()">Unlock</button>
    <div class="msg" id="pinMsg"></div>
  </div>

  <div id="mainScreen">
    <div class="field">
      <label class="label" for="phoneInput">Customer Phone Number</label>
      <input type="tel" id="phoneInput" placeholder="e.g., 03 123 456" maxlength="20" inputmode="tel">
    </div>

    <div class="field">
      <label class="label" for="itemsInput">Final Number of Items</label>
      <input type="number" id="itemsInput" placeholder="e.g., 6" min="1" inputmode="numeric">
      <p class="hint">Adds to this customer's total for the month (does not replace).</p>
    </div>

    <button class="btn" id="confirmBtn" onclick="confirmOrder()">✅ Confirm Order</button>
    <div class="msg" id="confirmMsg"></div>

    <hr class="divider">

    <div class="history-title">Today's Confirmed Orders</div>
    <ul class="history-list" id="historyList">
      <li style="color:#bbb; text-align:center;">No orders confirmed yet today</li>
    </ul>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://cfvsxnvvkdskbkljqicw.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmdnN4bnZ2a2Rza2JrbGpxaWN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ1MzU0MTcsImV4cCI6MjA2MDExMTQxN30.dNZsSOJyW1bE4bDQP-AIEYV7Z6hlw_iVMN6LZ2IdPio';
  const EMPLOYEE_PIN = '1234';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let isSaving = false;

  // Local YYYY-MM-DD (avoids UTC timezone wipe bug)
  function localDateStr(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function currentMonthKey() {
    const n = new Date();
    return n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0');
  }

  // Compare stored date string by month only — no Date() timezone conversion
  function isFromPreviousMonth(lastResetDateStr) {
    if (!lastResetDateStr) return true;
    return String(lastResetDateStr).slice(0, 7) !== currentMonthKey();
  }

  function normalizePhone(raw) {
    let phone = String(raw).replace(/\D/g, '');
    if (phone.startsWith('0')) phone = '961' + phone.substring(1);
    else if (!phone.startsWith('961') && phone.length <= 10) phone = '961' + phone;
    return phone;
  }

  function tierName(items) {
    if (items >= 30) return 'Diamond';
    if (items >= 21) return 'Platinum';
    if (items >= 15) return 'Gold';
    if (items >= 9) return 'Silver';
    return 'None';
  }

  function tierLabel(items) {
    const map = {
      Diamond: 'Diamond 💠',
      Platinum: 'Platinum 💎',
      Gold: 'Gold 🥇',
      Silver: 'Silver 🥈',
      None: 'None'
    };
    return map[tierName(items)];
  }

  function checkPin() {
    const pin = document.getElementById('pinInput').value.trim();
    const msg = document.getElementById('pinMsg');
    if (pin === EMPLOYEE_PIN) {
      sessionStorage.setItem('hl_emp_auth', Date.now());
      showMain();
    } else {
      msg.className = 'msg error';
      msg.textContent = 'Wrong PIN. Try again.';
      document.getElementById('pinInput').classList.add('error');
      document.getElementById('pinInput').value = '';
    }
  }

  function showMain() {
    document.getElementById('pinScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    loadTodayHistory();
  }

  window.addEventListener('DOMContentLoaded', () => {
    const t = sessionStorage.getItem('hl_emp_auth');
    if (t && (Date.now() - parseInt(t)) < 8 * 60 * 60 * 1000) showMain();
  });

  async function confirmOrder() {
    if (isSaving) return;

    const phoneRaw = document.getElementById('phoneInput').value.trim();
    const itemsVal = parseInt(document.getElementById('itemsInput').value, 10);
    const msg = document.getElementById('confirmMsg');
    const btn = document.getElementById('confirmBtn');

    msg.className = 'msg';
    msg.style.display = 'none';

    if (!phoneRaw) {
      msg.className = 'msg error';
      msg.textContent = 'Please enter the customer phone number.';
      document.getElementById('phoneInput').classList.add('error');
      return;
    }
    if (!itemsVal || itemsVal < 1) {
      msg.className = 'msg error';
      msg.textContent = 'Please enter the number of items.';
      document.getElementById('itemsInput').classList.add('error');
      return;
    }

    document.getElementById('phoneInput').classList.remove('error');
    document.getElementById('itemsInput').classList.remove('error');

    isSaving = true;
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const phone = normalizePhone(phoneRaw);
    const monthStart = localDateStr(new Date(new Date().getFullYear(), new Date().getMonth(), 1));

    try {
      const { data: existing, error: fetchError } = await sb
        .from('loyalty_points')
        .select('*')
        .eq('customer_phone', phone)
        .maybeSingle();

      if (fetchError) throw fetchError;

      let newItems;
      let previousItems = 0;

      if (existing) {
        const resetNeeded = isFromPreviousMonth(existing.last_reset_date);
        previousItems = resetNeeded ? 0 : (existing.items_purchased || 0);
        newItems = previousItems + itemsVal;
        const newTier = tierName(newItems);

        const { error } = await sb.from('loyalty_points').update({
          items_purchased: newItems,
          points: Math.floor(newItems / 3),
          current_tier: newTier,
          redeemed_this_month: resetNeeded ? false : !!existing.redeemed_this_month,
          last_reset_date: monthStart
        }).eq('customer_phone', phone);

        if (error) throw error;
      } else {
        newItems = itemsVal;
        const newTier = tierName(newItems);

        const { error } = await sb.from('loyalty_points').insert([{
          customer_phone: phone,
          items_purchased: newItems,
          points: Math.floor(newItems / 3),
          current_tier: newTier,
          redeemed_this_month: false,
          last_reset_date: monthStart
        }]);

        if (error) throw error;
      }

      const label = tierLabel(newItems);
      let successText = 'Added ' + itemsVal + ' items. Monthly total: ' + newItems + ' (' + label + ')';
      if (previousItems > 0) {
        successText = 'Added ' + itemsVal + ' to previous ' + previousItems + '. Monthly total: ' + newItems + ' (' + label + ')';
      }

      msg.className = 'msg success';
      msg.textContent = successText;

      const history = JSON.parse(localStorage.getItem('hl_order_history') || '[]');
      history.unshift({
        phone: phoneRaw,
        items: itemsVal,
        total: newItems,
        tier: label,
        time: new Date().toLocaleTimeString()
      });
      localStorage.setItem('hl_order_history', JSON.stringify(history.slice(0, 20)));
      loadTodayHistory();

      document.getElementById('phoneInput').value = '';
      document.getElementById('itemsInput').value = '';
      document.getElementById('phoneInput').focus();
    } catch (err) {
      msg.className = 'msg error';
      msg.textContent = 'Error: ' + (err.message || 'Could not save. Try again.');
    } finally {
      isSaving = false;
      btn.disabled = false;
      btn.textContent = '✅ Confirm Order';
    }
  }

  function loadTodayHistory() {
    const list = document.getElementById('historyList');
    const history = JSON.parse(localStorage.getItem('hl_order_history') || '[]');
    if (!history.length) {
      list.innerHTML = '<li style="color:#bbb; text-align:center;">No orders confirmed yet today</li>';
      return;
    }
    list.innerHTML = history.map(h =>
      '<li>' +
        '<div class="history-top">' +
          '<span><strong>' + h.phone + '</strong> +' + h.items + ' items</span>' +
          '<span class="tier-badge">' + h.tier + '</span>' +
        '</div>' +
        '<div style="color:#999;font-size:0.75rem;">Month total: ' + h.total + ' · ' + h.time + '</div>' +
      '</li>'
    ).join('');
  }
</script>
</body>
</html>
