<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heavenlynn Admin Login</title>
  <script src="https://unpkg.com/@supabase/supabase-js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 100%;
    }

    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 3rem;
      text-align: center;
      color: #8a4fff;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      text-align: center;
      color: #6b6b6b;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #301e54;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid #e4d7ff;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #8a4fff;
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #8a4fff, #ff7eb5);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
    }

    .login-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: #ffe5e5;
      color: #d32f2f;
      padding: 0.8rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }

    .back-link a {
      color: #8a4fff;
      text-decoration: none;
      font-weight: 500;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">heavenlynn</div>
    <div class="subtitle">Admin Dashboard</div>
    
    <div class="error-message" id="errorMessage"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">Login</button>
    </form>
    
    <div class="back-link">
      <a href="index.html">← Back to Menu</a>
    </div>
  </div>

  <script>
    // Initialize Supabase - Wait for library to load
    let supabase;
    
    function initSupabase() {
      if (typeof window.supabase === 'undefined') {
        console.error('Supabase library not loaded yet');
        return false;
      }
      
      if (typeof window.adminSupabase === 'undefined') {
        try {
          window.adminSupabase = window.supabase.createClient(
            'https://cfvsxnvvkdskbkljqicw.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmdnN4bnZ2a2Rza2JrbGpxaWN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ1MzU0MTcsImV4cCI6MjA2MDExMTQxN30.dNZsSOJyW1bE4bDQP-AIEYV7Z6hlw_iVMN6LZ2IdPio'
          );
          console.log('Supabase client initialized successfully');
        } catch (err) {
          console.error('Error creating Supabase client:', err);
          return false;
        }
      }
      supabase = window.adminSupabase;
      return true;
    }

    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');

    // Check if already logged in
    async function checkAuth() {
      if (!supabase) {
        console.log('Supabase not ready, skipping auth check');
        return;
      }
      
      try {
        const { data: { session }, error } = await supabase.auth.getSession();
        
        if (error) {
          console.error('Auth check error:', error);
          return;
        }
        
        if (session) {
          console.log('Already logged in, redirecting...');
          window.location.replace('admin.html');
        }
      } catch (error) {
        console.error('Auth check failed:', error);
      }
    }

    // Login function
    async function handleLogin(e) {
      e.preventDefault();
      
      if (!supabase) {
        errorMessage.textContent = 'Supabase not initialized. Please refresh the page.';
        errorMessage.classList.add('show');
        return;
      }
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      errorMessage.classList.remove('show');
      
      try {
        console.log('Attempting login for:', email);
        
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });
        
        if (error) {
          console.error('Login error:', error);
          throw error;
        }
        
        console.log('Login successful!', data);
        
        setTimeout(() => {
          window.location.replace('admin.html');
        }, 500);
        
      } catch (error) {
        console.error('Login failed:', error);
        errorMessage.textContent = error.message || 'Invalid email or password. Please check your credentials.';
        errorMessage.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    }

    // Wait for DOM and Supabase to be ready
    document.addEventListener('DOMContentLoaded', () => {
      // Try to initialize immediately
      if (initSupabase()) {
        checkAuth();
        loginForm.addEventListener('submit', handleLogin);
      } else {
        // Retry after a delay if Supabase isn't loaded yet
        let retries = 0;
        const maxRetries = 10;
        const checkInterval = setInterval(() => {
          retries++;
          if (initSupabase()) {
            clearInterval(checkInterval);
            checkAuth();
            loginForm.addEventListener('submit', handleLogin);
            console.log('Supabase initialized after', retries, 'retries');
          } else if (retries >= maxRetries) {
            clearInterval(checkInterval);
            errorMessage.textContent = 'Failed to connect to Supabase. Please check your internet connection and refresh the page.';
            errorMessage.classList.add('show');
            console.error('Failed to initialize Supabase after', maxRetries, 'retries');
          }
        }, 200);
      }
    });
  </script>
</body>
</html>
